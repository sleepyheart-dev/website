<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact — A P Pacheco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="dateline"></div>
  <header>
    <h1>Contact</h1>
    <nav>
      <a href="index.html">Home</a> · <a href="about.html">About</a> · <a href="research.html">Research</a> ·
      <a href="future.html">Future</a> · <a href="docs.html">Docs</a> · <a href="publications.html">Publications</a> ·
      <a href="contact.html">Contact</a> · <a href="index-no.html">NO</a>
    </nav>
  </header>
  <main>    
    <p>Email: <a href="mailto:andrepac@uio.no">&#097;andrepac&#64;uio.no</a></p>

    <form class="contact"
          action="https://formspree.io/f/YOUR-FORM-ID"
          method="POST" autocomplete="off" novalidate>
      <input type="hidden" name="_subject" value="Website inquiry (appacheco.net)">
      <input type="hidden" name="_next" value="/contact-thanks.html">

      <label>Your name <input type="text" name="name" required></label>
      <label>Email <input type="email" name="email" required></label>
      <label>Message <textarea name="message" required></textarea></label>

      <div class="hp-wrap" aria-hidden="true">
        <label>Leave this field empty <input type="text" name="_gotcha" tabindex="-1" autocomplete="off"></label>
      </div>

      <label>Human check: What is 2 + 2?
        <input type="text" name="check" inputmode="numeric" pattern="4|04|four|Four" title="Please enter 4" required>
      </label>

      <button type="submit">Send</button>
      <p class="small">Educational site — not a clinical booking channel.</p>
    </form>
  </main>
  <footer>© <span id="y"></span> André P. Pacheco</footer>
  <script>
    document.getElementById('dateline').textContent =
      new Date().toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric'});
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
