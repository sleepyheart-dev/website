<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <title>Kontakt — A P Pacheco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="dateline"></div>
  <header>
    <h1>Kontakt</h1>
    <nav>
      <a href="index-no.html">Hjem</a> ·
      <a href="om.html">Om meg</a> ·
      <a href="forskning.html">Forskning</a> ·
      <a href="videre.html">Videre</a> ·
      <a href="dokumenter.html">Dokumenter</a> ·
      <a href="publications-no.html">Publikasjoner</a> ·
      <a href="kontakt.html">Kontakt</a> ·
      <a href="index.html">EN</a>
    </nav>
  </header>

  <main>
    <p>E-post: <a href="mailto:andrepac@uio.no">andrepac@uio.no</a></p>

    <form class="contact"
          action="https://formspree.io/f/YOUR-FORM-ID"
          method="POST" autocomplete="off" novalidate>
      <input type="hidden" name="_subject" value="Henvendelse fra nettsiden (appacheco.net)">
      <input type="hidden" name="_next" value="/contact-takk.html">

      <label>Navn <input type="text" name="name" required></label>
      <label>E-post <input type="email" name="email" required></label>
      <label>Melding <textarea name="message" required></textarea></label>

      <div class="hp-wrap" aria-hidden="true">
        <label>La dette feltet stå tomt <input type="text" name="_gotcha" tabindex="-1" autocomplete="off"></label>
      </div>

      <label>Menneskesjekk: Hva er 2 + 2?
        <input type="text" name="check" inputmode="numeric"
               pattern="4|04|fire|Fire" title="Skriv 4" required>
      </label>

      <button type="submit">Send</button>
      <p class="small">Faglig informasjon — ikke kanal for kliniske henvendelser.</p>
    </form>
  </main>

  <footer>© <span id="y"></span> André P. Pacheco</footer>
  <script>
    document.getElementById('dateline').textContent =
      new Date().toLocaleDateString('no-NO',{year:'numeric',month:'long',day:'numeric'});
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
